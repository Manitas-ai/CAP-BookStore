_schema-version: "3.1"
ID: book-store
description: SAP Book-Store Learning POC
version: 1.0.0

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - ./node_modules/.bin/cds build --production

modules:

  - name: book-store-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: book-store-db

  - name: book-store-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: book-store-db

  # UI modules listed for BAS Storyboard visibility only.
  # supported-platforms: [] = NOT deployed separately; served statically by book-store-srv.
  - name: book-store-bookshop
    type: html5
    path: app/bookshop
    build-parameters:
      supported-platforms: []

  - name: book-store-admin-books
    type: html5
    path: app/admin-books
    build-parameters:
      supported-platforms: []

  - name: book-store-admin-authors
    type: html5
    path: app/admin-authors
    build-parameters:
      supported-platforms: []

resources:
  - name: book-store-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

parameters:
  enable-parallel-deployments: true
