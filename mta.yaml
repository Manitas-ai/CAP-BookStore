_schema-version: "3.1"
ID: book-store
description: SAP Book-Store Learning POC
version: 1.0.0

# ── Single-module deployment ────────────────────────────────────────────────
# CAP Node.js serves BOTH the OData APIs (/browse/, /admin/) AND the static
# UI5 files from app/ — no separate approuter module needed.
# Local dev: SQLite via [default] profile in package.json
# CF production: HANA Cloud HDI container (book-store-db) via [production] profile
# Auth stays mocked (no XSUAA). Fine for POC; swap to XSUAA for production.

modules:

  - name: book-store-srv
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
        - .env
        - default-env.json
        - "*.db"
        - .git/
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: book-store-db

  # ── UI modules listed for BAS Storyboard visibility ─────────────────────
  # supported-platforms: [] means they are NOT deployed separately to CF.
  # They are served as static files by book-store-srv above.

  - name: book-store-bookshop
    type: html5
    path: app/bookshop
    build-parameters:
      supported-platforms: []

  - name: book-store-admin-books
    type: html5
    path: app/admin-books
    build-parameters:
      supported-platforms: []

  - name: book-store-admin-authors
    type: html5
    path: app/admin-authors
    build-parameters:
      supported-platforms: []

resources:
  - name: book-store-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
